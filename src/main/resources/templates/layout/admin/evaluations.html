<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evaluation Management - TES</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/quries.css}">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

  <style>
    :root {
        --deep-navy: #161E54;
        --light-blue: #BBE0EF;
        --white: #FFFFFF;
        --success-green: #2ECC71;
        --error-red: #E76F51;
        --warning-yellow: #F1C40F;
    }

    body {
        background-color: var(--light-blue);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
    }

    .container-custom {
        padding: 20px;
        margin-top: 70px;
    }

    .page-header {
        background: var(--white);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .form-card {
        background: var(--white);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .table-card {
        background: var(--white);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn-back {
        background-color: var(--deep-navy);
        border: none;
        color: white;
        border-radius: 20px;
        padding: 8px 20px;
    }

    .btn-back:hover {
        background-color: #0f1442;
        color: white;
    }

    .btn-save {
        background-color: var(--success-green);
        border: none;
        color: white;
        border-radius: 10px;
        padding: 10px 20px;
    }

    .btn-save:hover {
        background-color: #27ae60;
        color: white;
    }

    .score-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
    }

    .score-excellent { background-color: #2ECC71; color: white; }
    .score-good { background-color: #3498db; color: white; }
    .score-average { background-color: #F1C40F; color: #333; }
    .score-poor { background-color: #E76F51; color: white; }

    .chart-title {
        color: var(--deep-navy);
        font-weight: bold;
        margin-bottom: 15px;
        border-left: 4px solid #F16D34;
        padding-left: 15px;
    }

    .star-rating {
        display: flex;
        gap: 5px;
        cursor: pointer;
    }

    .star-rating i {
        font-size: 24px;
        color: #ddd;
        transition: color 0.2s;
    }

    .star-rating i.active {
        color: #F1C40F;
    }
  </style>
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container-custom">
  <div class="container-fluid">

    <!-- Header -->
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h2><i class="fas fa-star"></i> Evaluation Management</h2>
          <p class="text-muted mb-0">Manage task evaluations and performance scores</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-back">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <!-- Add Evaluation Form -->
    <div class="form-card">
      <h5 class="chart-title"><i class="fas fa-plus-circle"></i> Add New Evaluation</h5>
      <form id="evaluationForm">
        <input type="hidden" id="evaluationId">

        <div class="row">
          <div class="col-md-6">
            <label class="fw-bold mb-2">Task</label>
            <select id="taskSelect" class="form-select" required>
              <option value="">Select Task</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="fw-bold mb-2">Supervisor</label>
            <select id="supervisorSelect" class="form-select" required>
              <option value="">Select Supervisor</option>
            </select>
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-md-3">
            <label class="fw-bold mb-2">Score (0-100)</label>
            <input type="number" id="score" class="form-control" min="0" max="100" step="0.1" placeholder="Enter score" required>
          </div>
          <div class="col-md-3">
            <label class="fw-bold mb-2">Year</label>
            <select id="year" class="form-select" required>
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026" selected>2026</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="fw-bold mb-2">Quarter</label>
            <select id="quarter" class="form-select" required>
              <option value="1">Q1</option>
              <option value="2">Q2</option>
              <option value="3">Q3</option>
              <option value="4">Q4</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="fw-bold mb-2">Evaluation Date</label>
            <input type="datetime-local" id="evaluationDate" class="form-control" required>
          </div>
        </div>

        <div class="mt-3">
          <label class="fw-bold mb-2">Remarks</label>
          <textarea id="remarks" class="form-control" rows="3" placeholder="Enter evaluation remarks..."></textarea>
        </div>

        <!-- Star Rating Visual -->
        <div class="mt-3">
          <label class="fw-bold mb-2">Rating</label>
          <div class="star-rating" id="starRating">
            <i class="far fa-star" data-value="20"></i>
            <i class="far fa-star" data-value="40"></i>
            <i class="far fa-star" data-value="60"></i>
            <i class="far fa-star" data-value="80"></i>
            <i class="far fa-star" data-value="100"></i>
          </div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-save" id="submitBtn">
            <i class="fas fa-save me-2"></i>Save Evaluation
          </button>
          <button type="button" class="btn btn-secondary ms-2" id="cancelBtn">
            <i class="fas fa-times me-2"></i>Cancel
          </button>
        </div>
        <div id="formMessage" class="mt-2"></div>
      </form>
    </div>

    <!-- Evaluations Table -->
    <div class="table-card">
      <h5 class="chart-title"><i class="fas fa-list"></i> Evaluation Records</h5>
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
          <tr>
            <th>Evaluation Code</th>
            <th>Task</th>
            <th>Supervisor</th>
            <th>Score</th>
            <th>Quarter/Year</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody id="evaluationTableBody">
          <tr>
            <td colspan="7" class="text-center">Loading evaluations...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title"><i class="fas fa-trash"></i> Confirm Delete</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <p>Are you sure you want to delete this evaluation?</p>
        <small id="deleteCode" class="text-muted"></small>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
          <i class="fas fa-trash me-2"></i>Delete
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const API_BASE = '/evaluations';
  let evaluations = [];
  let deleteId = null;
  let deleteModal;

  $(document).ready(function() {
      deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

      // Initialize Select2
      $('#taskSelect, #supervisorSelect').select2({
          placeholder: 'Select...',
          allowClear: true,
          width: '100%'
      });

      // Set default evaluation date
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      $('#evaluationDate').val(now.toISOString().slice(0, 16));

      // Load tasks and supervisors
      loadTasks();
      loadSupervisors();
      loadEvaluations();

      // Star rating
      $('#starRating i').on('click', function() {
          const value = $(this).data('value');
          $('#score').val(value);
          updateStars(value);
      });

      $('#score').on('input', function() {
          updateStars($(this).val());
      });

      // Cancel button
      $('#cancelBtn').click(function() {
          resetForm();
      });

      // Submit form
      $('#evaluationForm').submit(function(e) {
          e.preventDefault();
          saveEvaluation();
      });

      // Delete confirmation
      $('#confirmDeleteBtn').click(function() {
          if (deleteId) {
              deleteEvaluation(deleteId);
          }
      });
  });

  function updateStars(score) {
      const stars = $('#starRating i');
      stars.removeClass('fas active').addClass('far');

      if (score >= 20) stars.eq(0).removeClass('far').addClass('fas active');
      if (score >= 40) stars.eq(1).removeClass('far').addClass('fas active');
      if (score >= 60) stars.eq(2).removeClass('far').addClass('fas active');
      if (score >= 80) stars.eq(3).removeClass('far').addClass('fas active');
      if (score >= 100) stars.eq(4).removeClass('far').addClass('fas active');
  }

  function getScoreClass(score) {
      if (score >= 80) return 'score-excellent';
      if (score >= 60) return 'score-good';
      if (score >= 40) return 'score-average';
      return 'score-poor';
  }

  async function loadTasks() {
      try {
          const res = await fetch('/tasks/all');
          const data = await res.json();
          const select = $('#taskSelect');
          select.empty().append('<option value="">Select Task</option>');
          data.tasks.forEach(task => {
              select.append(`<option value="${task.taskId}">${task.taskCode} - ${task.description}</option>`);
          });
      } catch (err) {
          console.error('Failed to load tasks:', err);
      }
  }

  async function loadSupervisors() {
      try {
          const res = await fetch('/supervisors');
          const data = await res.json();
          const select = $('#supervisorSelect');
          select.empty().append('<option value="">Select Supervisor</option>');
          data.forEach(supervisor => {
              const name = supervisor.user ?
                  `${supervisor.user.firstName} ${supervisor.user.otherName || ''}` :
                  supervisor.supervisorCode;
              select.append(`<option value="${supervisor.supervisorId}">${name}</option>`);
          });
      } catch (err) {
          console.error('Failed to load supervisors:', err);
      }
  }

  async function loadEvaluations() {
      try {
          const res = await fetch(API_BASE);
          evaluations = await res.json();
          renderTable();
      } catch (err) {
          console.error('Failed to load evaluations:', err);
          $('#evaluationTableBody').html('<tr><td colspan="7" class="text-center text-danger">Failed to load evaluations</td></tr>');
      }
  }

  function renderTable() {
      const tbody = $('#evaluationTableBody');

      if (evaluations.length === 0) {
          tbody.html('<tr><td colspan="7" class="text-center">No evaluations found</td></tr>');
          return;
      }

      let html = '';
      evaluations.forEach(e => {
          const scoreClass = getScoreClass(e.score || 0);
          html += `
              <tr>
                  <td><code>${e.evaluationCode || 'N/A'}</code></td>
                  <td>Task #${e.taskId}</td>
                  <td>Supervisor #${e.supervisorId}</td>
                  <td><span class="score-badge ${scoreClass}">${e.score || 0}%</span></td>
                  <td>Q${e.quarter}/${e.year}</td>
                  <td>${e.evaluationDate ? new Date(e.evaluationDate).toLocaleDateString() : 'N/A'}</td>
                  <td>
                      <button class="btn btn-sm btn-info edit-btn" data-id="${e.evaluationId}">
                          <i class="fas fa-edit"></i>
                      </button>
                      <button class="btn btn-sm btn-danger delete-btn" data-id="${e.evaluationId}" data-code="${e.evaluationCode}">
                          <i class="fas fa-trash"></i>
                      </button>
                  </td>
              </tr>
          `;
      });
      tbody.html(html);
  }

  $(document).on('click', '.edit-btn', function() {
      const id = $(this).data('id');
      const evaluation = evaluations.find(e => e.evaluationId === id);
      if (evaluation) {
          editEvaluation(evaluation);
      }
  });

  $(document).on('click', '.delete-btn', function() {
      deleteId = $(this).data('id');
      $('#deleteCode').text($(this).data('code'));
      deleteModal.show();
  });

  function editEvaluation(evaluation) {
      $('#evaluationId').val(evaluation.evaluationId);
      $('#taskSelect').val(evaluation.taskId).trigger('change');
      $('#supervisorSelect').val(evaluation.supervisorId).trigger('change');
      $('#score').val(evaluation.score);
      $('#remarks').val(evaluation.remarks || '');
      $('#year').val(evaluation.year);
      $('#quarter').val(evaluation.quarter);
      $('#evaluationDate').val(evaluation.evaluationDate ?
          evaluation.evaluationDate.slice(0, 16) : '');
      updateStars(evaluation.score);
      $('#submitBtn').html('<i class="fas fa-save me-2"></i>Update Evaluation');
  }

  function resetForm() {
      $('#evaluationId').val('');
      $('#evaluationForm')[0].reset();
      $('#taskSelect').val('').trigger('change');
      $('#supervisorSelect').val('').trigger('change');
      $('#score').val('');
      updateStars(0);
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      $('#evaluationDate').val(now.toISOString().slice(0, 16));
      $('#submitBtn').html('<i class="fas fa-save me-2"></i>Save Evaluation');
      $('#formMessage').html('');
  }

  async function saveEvaluation() {
      const id = $('#evaluationId').val();
      const data = {
          task_id: parseInt($('#taskSelect').val()),
          supervisorId: parseInt($('#supervisorSelect').val()),
          score: parseFloat($('#score').val()),
          remarks: $('#remarks').val(),
          year: parseInt($('#year').val()),
          quarter: parseInt($('#quarter').val()),
          evaluationDate: $('#evaluationDate').val()
      };

      if (!data.task_id || !data.supervisorId || !data.score) {
          $('#formMessage').html('<span class="text-danger">Please fill all required fields</span>');
          return;
      }

      const url = id ? `${API_BASE}/${id}` : API_BASE;
      const method = id ? 'PUT' : 'POST';

      try {
          const res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
          });

          if (res.ok) {
              $('#formMessage').html('<span class="text-success">Evaluation saved successfully!</span>');
              resetForm();
              loadEvaluations();
          } else {
              const error = await res.text();
              $('#formMessage').html(`<span class="text-danger">Failed to save: ${error}</span>`);
          }
      } catch (err) {
          $('#formMessage').html('<span class="text-danger">Network error occurred</span>');
      }
  }

  async function deleteEvaluation(id) {
      try {
          const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
          if (res.ok) {
              deleteModal.hide();
              loadEvaluations();
          }
      } catch (err) {
          console.error('Failed to delete:', err);
      }
      deleteId = null;
  }
</script>
</body>
</html>
