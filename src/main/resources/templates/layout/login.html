<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | TES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/quries.css}">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="login-wrapper d-flex w-100" style="max-width: 800px; min-width: 700px;">

    <!-- Left Panel: Welcome / Animation -->
    <div class="welcome-panel d-flex flex-column justify-content-center align-items-center p-4">
      <h2 class="welcome-title mb-3">Welcome Back!</h2>
      <p class="welcome-subtitle">Kindly login to access your account and continue managing tasks efficiently.</p>
      <div class="animated-line mt-3"></div>
    </div>

    <!-- Right Panel: Login Form -->
    <div class="login-card w-100 p-4">
      <h3 class="text-center login-title mb-4">TES Login</h3>

      <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Staff Code</label>
          <input type="number" name="staffCode" id="staffCode" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
          <div class="text-end mt-2">
            <a th:href="@{/auth/forgot-password}" class="text-muted">Forgot Password?</a>
          </div>
        </div>

        <button type="submit" class="btn btn-primary-custom w-100">
          Login
        </button>

        <!-- Display Spring Security error messages -->
        <div th:if="${param.error}" class="text-danger mt-2 text-center">
          Invalid staff code or password
        </div>
        <div th:if="${param.logout}" class="text-success mt-2 text-center">
          You have been logged out
        </div>
      </form>

      <div class="d-flex justify-content-between mt-3">
       <!-- <a href="/auth/register" id="registerAccount" class="small text-decoration-none">Don't have an account? Register</a> -->
      </div>

      <div id="errorMessage" class="text-error mt-3 text-center"></div>
    </div>
  </div>
</div>

<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
