<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>

<body>
<div th:replace="~{layout/navbar :: navbar}"></div>
<div class="offcanvas offcanvas-start offcanvas-custom"
     tabindex="-1"
     id="dashboardMenu"
     th:if="${#authorization.expression('isAuthenticated()')}">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">🚀 Dashboard</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <div class="list-group dashboard-menu">

            <a th:href="@{/dashboard/branches}" class="list-group-item list-group-item-action">
                🏢 Branch Management
            </a>

            <a th:href="@{/dashboard/departments}" class="list-group-item list-group-item-action">
                🏬 Department Management
            </a>

            <a th:href="@{/auth/register}" class="list-group-item list-group-item-action">
                👤 Register User
            </a>
            <a th:href="@{/dashboard/users}" class="list-group-item list-group-item-action">
                👤👤 Manage Users
            </a>

            <a th:href="@{/dashboard/supervisors}" class="list-group-item list-group-item-action">
                🧑‍💼 Supervisor Management
            </a>
            <a th:href="@{/role-management}" class="list-group-item list-group-item-action">
                🧑‍💼 Role Management
            </a>

            <a th:href="@{/dashboard/taskassignments}" class="list-group-item list-group-item-action">
                📌 Assign Task
            </a>

            <a th:href="@{/dashboard/tasks}" class="list-group-item list-group-item-action">
                📋 Task Management
            </a>

        </div>

    </div>
</div>


<h1>Hello, hi world!</h1>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<!-- Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"> </script>
</body>
</html>
