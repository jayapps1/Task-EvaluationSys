<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TES Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="register-card">

        <a href="/admin/dashboard" class="btn btn-secondary mb-3">⬅ Back Home</a>

        <!-- ✅ ERROR MESSAGE -->
        <div th:if="${errorMessage}" class="alert alert-danger">
            <span th:text="${errorMessage}"></span>
        </div>

        <form id="registerForm" th:object="${registerDTO}" th:action="@{/auth/register}" method="post">

            <div class="register-row">

                <!-- WELCOME -->
                <div class="section-welcome mb-4">
                    <div class="welcome-text">
                        <div>Hey!! 😂</div>
                        <div>Thanks for joining</div>
                        <div class="welcome">Kindly register to access your account.</div>
                    </div>
                </div>

                <!-- LEFT SIDE -->
                <div class="section-register-step mb-3">

                    <div class="mb-3">
                        <label class="form-label">Staff Code</label>
                        <input type="text" th:field="*{staffCode}" class="form-control" required>
                        <div id="staffCodeError" class="text-danger"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Other Name</label>
                        <input type="text" th:field="*{otherName}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rank</label>
                        <input type="text" th:field="*{rank}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                        <div id="emailError" class="text-danger"></div>
                    </div>

                </div>

                <!-- RIGHT SIDE -->
                <div class="section-register-step mb-3">

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text">+233</span>
                            <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-control" required>
                        </div>
                        <div id="phoneError" class="text-danger"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select th:field="*{role}" class="form-select" required>
                            <option value="">Select Role</option>
                            <option value="STAFF">STAFF</option>
                            <option value="SUPERVISOR">SUPERVISOR</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <select th:field="*{departmentId}" class="form-select" required>
                            <option value="">Select Department</option>
                            <option th:each="d : ${departments}"
                                    th:value="${d.departmentId}"
                                    th:text="${d.departmentName + ' (' + d.branchName + ' / ' + d.branchLocation + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <select th:field="*{branchId}" class="form-select" required>
                            <option value="">Select Branch</option>
                            <option th:each="b : ${branches}"
                                    th:value="${b.branchId}"
                                    th:text="${b.branchName}">
                            </option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- ACTION -->
            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary px-5">Register</button>
            </div>

        </form>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function() {

        const staffCodeInput = $("#staffCode");
        const staffCodeError = $("#staffCodeError");
        const phoneInput = $("#phoneNumber");
        const phoneError = $("#phoneError");
        const emailInput = $("#email");
        const emailError = $("#emailError");

        function validateStaffCode() {
            const value = staffCodeInput.val().trim();
            if (value.length < 5 || value.length > 10) {
                staffCodeError.text("Staff Code must be 5–10 characters.");
                return false;
            }
            staffCodeError.text("");
            return true;
        }

        function validateEmail() {
            const value = emailInput.val().trim();
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!regex.test(value)) {
                emailError.text("Invalid email.");
                return false;
            }
            emailError.text("");
            return true;
        }

        function normalizePhone(raw) {
            let value = raw.trim();
            if (value.startsWith("0")) value = value.substring(1);
            if (!/^[0-9]{9}$/.test(value)) return null;
            return "+233" + value;
        }

        // ✅ FIXED SUBMIT HANDLER
        $("#registerForm").on("submit", function(e) {

            if (!validateStaffCode()) {
                e.preventDefault();
                return;
            }

            if (!validateEmail()) {
                e.preventDefault();
                return;
            }

            const normalized = normalizePhone(phoneInput.val());
            if (!normalized) {
                phoneError.text("Invalid phone number");
                e.preventDefault();
                return;
            }

            phoneInput.val(normalized);
        });

        // Select2 (optional)
        $('select').select2({ width: '100%' });

    });
</script>

</body>
</html>
