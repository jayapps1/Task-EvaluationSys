<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - TES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">

    <style>
        :root {
            --deep-navy: #161E54;
            --light-blue: #BBE0EF;
            --white: #FFFFFF;
            --success-green: #2ECC71;
            --error-red: #E76F51;
        }

        body {
            background: linear-gradient(135deg, var(--deep-navy), #2a3f8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .forgot-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 0 auto;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--deep-navy);
            margin-bottom: 20px;
        }

        .btn-primary {
            background-color: var(--deep-navy);
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: #0f1442;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--deep-navy);
            box-shadow: 0 0 0 0.2rem rgba(22, 30, 84, 0.25);
        }

        .back-link {
            color: var(--deep-navy);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="forgot-card">
        <div class="text-center">
            <div class="logo-icon">
                <i class="fas fa-rocket"></i>
            </div>
            <h3 class="mb-2" style="color: var(--deep-navy);">Forgot Password?</h3>
            <p class="text-muted mb-4">Enter your staff code or email to receive an OTP</p>
        </div>

        <form id="forgotForm">
            <div class="mb-4">
                <label class="fw-bold mb-2">Staff Code or Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control border-start-0" id="staffCodeOrEmail"
                           placeholder="Enter staff code or email" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                <i class="fas fa-paper-plane me-2"></i>Send OTP
            </button>

            <div id="errorMessage" class="error-message"></div>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/auth/login}" class="back-link">
                <i class="fas fa-arrow-left me-1"></i>Back to Login
            </a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        $('#forgotForm').on('submit', function(e) {
            e.preventDefault();

            const staffCodeOrEmail = $('#staffCodeOrEmail').val().trim();
            $('#errorMessage').text('').css('color', 'var(--error-red)');

            if (!staffCodeOrEmail) {
                $('#errorMessage').text('Please enter your staff code or email');
                return;
            }

            // Show loading
            $('#submitBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Sending...');

            $.ajax({
                url: '/auth/password/forgot',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ staffCodeOrEmail: staffCodeOrEmail }),
                success: function(response) {
                    console.log('Forgot password response:', response);

                    if (response.success) {
                        // ✅ USE THE REAL EMAIL - NOT maskedEmail!
                        const realEmail = response.email;
                        console.log('Redirecting with realEmail:', realEmail);

                        // Show success and redirect
                        $('#errorMessage').css('color', 'var(--success-green)').text('OTP sent successfully! Redirecting...');

                        setTimeout(() => {
                            // ✅ Pass REAL email in URL
                            window.location.href = '/auth/verify-otp?email=' + encodeURIComponent(realEmail);
                        }, 1500);
                    } else {
                        $('#errorMessage').text(response.message || 'Failed to send OTP');
                        $('#submitBtn').prop('disabled', false).html('<i class="fas fa-paper-plane me-2"></i>Send OTP');
                    }
                },
                error: function(xhr) {
                    console.error('Error:', xhr);
                    const error = xhr.responseJSON?.error || xhr.responseJSON?.message || 'Failed to send OTP';
                    $('#errorMessage').text(error);
                    $('#submitBtn').prop('disabled', false).html('<i class="fas fa-paper-plane me-2"></i>Send OTP');
                }
            });
        });

        // Allow Enter key to submit
        $('#staffCodeOrEmail').on('keypress', function(e) {
            if (e.which === 13) {
                $('#forgotForm').submit();
            }
        });
    });
</script>
</body>
</html>
