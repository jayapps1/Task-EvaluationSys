<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify OTP - TES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">

    <style>
        :root {
            --deep-navy: #161E54;
            --light-blue: #BBE0EF;
            --white: #FFFFFF;
            --success-green: #2ECC71;
            --error-red: #E76F51;
        }

        body {
            background: linear-gradient(135deg, var(--deep-navy), #2a3f8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .verify-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 0 auto;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--deep-navy);
            margin-bottom: 20px;
        }

        .btn-primary {
            background-color: var(--deep-navy);
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: #0f1442;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin: 0 5px;
        }

        .otp-input:focus {
            border-color: var(--deep-navy);
            box-shadow: 0 0 0 0.2rem rgba(22, 30, 84, 0.25);
            outline: none;
        }

        .back-link {
            color: var(--deep-navy);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .resend-link {
            color: var(--deep-navy);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .timer {
            color: var(--error-red);
            font-weight: bold;
        }

        .error-message {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: var(--success-green);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="verify-card">
        <div class="text-center">
            <div class="logo-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h3 class="mb-2" style="color: var(--deep-navy);">Verify OTP</h3>
            <p class="text-muted mb-1">Enter the 6-digit code sent to</p>
            <p class="fw-bold mb-4" id="emailDisplay">your email</p>
        </div>

        <form id="otpForm">
            <input type="hidden" id="email">

            <div class="d-flex justify-content-center gap-2 mb-4">
                <input type="text" class="otp-input" maxlength="1" data-index="0" autofocus>
                <input type="text" class="otp-input" maxlength="1" data-index="1">
                <input type="text" class="otp-input" maxlength="1" data-index="2">
                <input type="text" class="otp-input" maxlength="1" data-index="3">
                <input type="text" class="otp-input" maxlength="1" data-index="4">
                <input type="text" class="otp-input" maxlength="1" data-index="5">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="verifyBtn">
                <i class="fas fa-check-circle me-2"></i>Verify OTP
            </button>

            <div id="message" class="error-message"></div>
        </form>

        <div class="text-center">
            <p class="mb-2">
                Didn't receive the code?
                <span class="resend-link" id="resendBtn">
                    <i class="fas fa-redo-alt me-1"></i>Resend OTP
                </span>
                <span id="timer" class="timer ms-2"></span>
            </p>
            <a th:href="@{/auth/forgot-password}" class="back-link">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ ADDED th:inline="javascript" -->
<script th:inline="javascript">
    // ✅ Get email DIRECTLY from server via Thymeleaf
    const SERVER_EMAIL = /*[[${email}]]*/ '';
    console.log('SERVER_EMAIL:', SERVER_EMAIL);

    // Helper function to mask email for display
    function maskEmail(email) {
        if (!email || !email.includes('@')) return email;
        const atIndex = email.indexOf('@');
        if (atIndex <= 2) return email;
        return email.substring(0, 3) + '***' + email.substring(atIndex);
    }

    $(document).ready(function() {
        // ✅ Use SERVER_EMAIL as primary source
        let realEmail = SERVER_EMAIL;

        // Fallback to URL parameter if server email is empty
        if (!realEmail) {
            const urlParams = new URLSearchParams(window.location.search);
            realEmail = urlParams.get('email') || '';
        }

        console.log('Final realEmail:', realEmail);

        // If no email, redirect back
        if (!realEmail || realEmail === '') {
            console.error('No email provided, redirecting...');
            window.location.href = '/auth/forgot-password';
            return;
        }

        // ✅ Store real email in hidden field
        $('#email').val(realEmail);
        console.log('Hidden field value:', $('#email').val());

        // ✅ Display MASKED version
        const maskedEmail = maskEmail(realEmail);
        $('#emailDisplay').text(maskedEmail);

        const inputs = $('.otp-input');

        // Auto-focus and move to next input
        inputs.on('input', function() {
            const index = $(this).data('index');
            const value = $(this).val();
            if (value && index < 5) {
                inputs.eq(index + 1).focus();
            }
        });

        // Handle backspace
        inputs.on('keydown', function(e) {
            if (e.key === 'Backspace' && !$(this).val()) {
                const index = $(this).data('index');
                if (index > 0) {
                    inputs.eq(index - 1).focus();
                }
            }
        });

        // Only allow numbers
        inputs.on('keypress', function(e) {
            if (e.which < 48 || e.which > 57) {
                e.preventDefault();
            }
        });

        // Timer for resend
        let timeLeft = 60;
        let timerInterval;

        function startTimer() {
            $('#resendBtn').hide();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                timeLeft--;
                $('#timer').text(`(${timeLeft}s)`);
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    $('#resendBtn').show();
                    $('#timer').text('');
                    timeLeft = 60;
                }
            }, 1000);
        }

        startTimer();

        // ✅ Verify OTP - USE realEmail DIRECTLY
        $('#otpForm').on('submit', function(e) {
            e.preventDefault();

            let otp = '';
            inputs.each(function() { otp += $(this).val(); });

            if (otp.length !== 6) {
                $('#message').removeClass('success-message').addClass('error-message')
                    .text('Please enter the complete 6-digit OTP');
                return;
            }

            $('#verifyBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Verifying...');

            // ✅ USE realEmail DIRECTLY (not from hidden field)
            console.log('Sending to API - Email:', realEmail, 'OTP:', otp);

            $.ajax({
                url: '/auth/password/verify-otp',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email: realEmail, otp: otp }),
                success: function(response) {
                    console.log('API Response:', response);
                    if (response.success) {
                        $('#message').removeClass('error-message').addClass('success-message')
                            .text('OTP Verified! Redirecting...');
                        setTimeout(() => {
                            window.location.href = '/auth/reset-password?token=' + response.resetToken;
                        }, 1500);
                    } else {
                        $('#message').removeClass('success-message').addClass('error-message')
                            .text(response.message || 'Invalid OTP');
                        $('#verifyBtn').prop('disabled', false).html('<i class="fas fa-check-circle me-2"></i>Verify OTP');
                    }
                },
                error: function(xhr) {
                    console.error('API Error:', xhr);
                    const error = xhr.responseJSON?.message || xhr.responseJSON?.error || 'Invalid OTP';
                    $('#message').removeClass('success-message').addClass('error-message').text(error);
                    $('#verifyBtn').prop('disabled', false).html('<i class="fas fa-check-circle me-2"></i>Verify OTP');
                }
            });
        });

        // ✅ Resend OTP - USE realEmail DIRECTLY
        $('#resendBtn').on('click', function() {
            $('#message').text('');
            console.log('Resending OTP to:', realEmail);

            $.ajax({
                url: '/auth/password/resend-otp',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email: realEmail }),
                success: function(response) {
                    if (response.success) {
                        $('#message').removeClass('error-message').addClass('success-message')
                            .text('New OTP sent successfully!');
                        timeLeft = 60;
                        startTimer();
                        inputs.val('').first().focus();
                    }
                },
                error: function(xhr) {
                    $('#message').removeClass('success-message').addClass('error-message')
                        .text(xhr.responseJSON?.message || xhr.responseJSON?.error || 'Failed to resend OTP');
                }
            });
        });

        // Allow paste of OTP
        inputs.on('paste', function(e) {
            e.preventDefault();
            const pastedText = (e.originalEvent.clipboardData || window.clipboardData).getData('text');
            if (pastedText && pastedText.length === 6 && /^\d+$/.test(pastedText)) {
                pastedText.split('').forEach((char, i) => { inputs.eq(i).val(char); });
                inputs.eq(5).focus();
                $('#otpForm').submit();
            }
        });
    });
</script>
</body>
</html>
