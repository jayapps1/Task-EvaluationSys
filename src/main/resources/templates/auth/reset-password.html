<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password - TES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">

    <style>
        :root {
            --deep-navy: #161E54;
            --light-blue: #BBE0EF;
            --white: #FFFFFF;
            --success-green: #2ECC71;
            --error-red: #E76F51;
        }

        body {
            background: linear-gradient(135deg, var(--deep-navy), #2a3f8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .reset-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 0 auto;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--deep-navy);
            margin-bottom: 20px;
        }

        .btn-primary {
            background-color: var(--deep-navy);
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: #0f1442;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--deep-navy);
            box-shadow: 0 0 0 0.2rem rgba(22, 30, 84, 0.25);
        }

        .password-strength {
            height: 5px;
            border-radius: 5px;
            margin-top: 5px;
            transition: all 0.3s;
        }

        .strength-weak { background-color: var(--error-red); width: 33%; }
        .strength-medium { background-color: #f39c12; width: 66%; }
        .strength-strong { background-color: var(--success-green); width: 100%; }

        .requirement {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .requirement.valid {
            color: var(--success-green);
        }

        .back-link {
            color: var(--deep-navy);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="reset-card">
        <div class="text-center">
            <div class="logo-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h3 class="mb-2" style="color: var(--deep-navy);">Reset Password</h3>
            <p class="text-muted mb-4">Enter your new password</p>
        </div>

        <form id="resetForm">
            <input type="hidden" id="resetToken" th:value="${token}">

            <div class="mb-3">
                <label class="fw-bold mb-2">New Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-key"></i>
                    </span>
                    <input type="password" class="form-control border-start-0 border-end-0"
                           id="newPassword" placeholder="Enter new password" required>
                    <span class="input-group-text bg-light border-start-0" onclick="togglePassword('newPassword')" style="cursor: pointer;">
                        <i class="fas fa-eye" id="toggleNewIcon"></i>
                    </span>
                </div>
                <div class="password-strength" id="strengthBar"></div>
                <div class="requirement" id="lengthReq"><i class="far fa-circle me-1"></i>At least 8 characters</div>
                <div class="requirement" id="upperReq"><i class="far fa-circle me-1"></i>One uppercase letter</div>
                <div class="requirement" id="lowerReq"><i class="far fa-circle me-1"></i>One lowercase letter</div>
                <div class="requirement" id="digitReq"><i class="far fa-circle me-1"></i>One number</div>
                <div class="requirement" id="specialReq"><i class="far fa-circle me-1"></i>One special character</div>
            </div>

            <div class="mb-4">
                <label class="fw-bold mb-2">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="fas fa-check-circle"></i>
                    </span>
                    <input type="password" class="form-control border-start-0 border-end-0"
                           id="confirmPassword" placeholder="Confirm new password" required>
                    <span class="input-group-text bg-light border-start-0" onclick="togglePassword('confirmPassword')" style="cursor: pointer;">
                        <i class="fas fa-eye" id="toggleConfirmIcon"></i>
                    </span>
                </div>
                <div id="matchMessage" class="requirement"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                <i class="fas fa-save me-2"></i>Reset Password
            </button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/auth/login}" class="back-link">
                <i class="fas fa-arrow-left me-1"></i>Back to Login
            </a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    function togglePassword(fieldId) {
        const field = $('#' + fieldId);
        const icon = fieldId === 'newPassword' ? '# – ' : '#toggleConfirmIcon';
        if (field.attr('type') === 'password') {
            field.attr('type', 'text');
            $(icon).removeClass('fa-eye').addClass('fa-eye-slash');
        } else {
            field.attr('type', 'password');
            $(icon).removeClass('fa-eye-slash').addClass('fa-eye');
        }
    }

    function checkPasswordStrength(password) {
        let strength = 0;

        if (password.length >= 8) {
            $('#lengthReq').addClass('valid').find('i').removeClass('fa-circle').addClass('fa-check-circle');
            strength++;
        } else {
            $('#lengthReq').removeClass('valid').find('i').removeClass('fa-check-circle').addClass('fa-circle');
        }

        if (/[A-Z]/.test(password)) {
            $('#upperReq').addClass('valid').find('i').removeClass('fa-circle').addClass('fa-check-circle');
            strength++;
        } else {
            $('#upperReq').removeClass('valid').find('i').removeClass('fa-check-circle').addClass('fa-circle');
        }

        if (/[a-z]/.test(password)) {
            $('#lowerReq').addClass('valid').find('i').removeClass('fa-circle').addClass('fa-check-circle');
            strength++;
        } else {
            $('#lowerReq').removeClass('valid').find('i').removeClass('fa-check-circle').addClass('fa-circle');
        }

        if (/[0-9]/.test(password)) {
            $('#digitReq').addClass('valid').find('i').removeClass('fa-circle').addClass('fa-check-circle');
            strength++;
        } else {
            $('#digitReq').removeClass('valid').find('i').removeClass('fa-check-circle').addClass('fa-circle');
        }

        if (/[^A-Za-z0-9]/.test(password)) {
            $('#specialReq').addClass('valid').find('i').removeClass('fa-circle').addClass('fa-check-circle');
            strength++;
        } else {
            $('#specialReq').removeClass('valid').find('i').removeClass('fa-check-circle').addClass('fa-circle');
        }

        const bar = $('#strengthBar');
        bar.removeClass('strength-weak strength-medium strength-strong');

        if (password.length === 0) {
            bar.css('width', '0%');
        } else if (strength <= 2) {
            bar.addClass('strength-weak');
        } else if (strength <= 4) {
            bar.addClass('strength-medium');
        } else {
            bar.addClass('strength-strong');
        }

        return strength === 5;
    }

    $(document).ready(function() {
        const token = $('#resetToken').val();

        if (!token) {
            Swal.fire({
                icon: 'error',
                title: 'Invalid Request',
                text: 'No reset token provided. Please request a new password reset.',
                confirmButtonColor: '#161E54'
            }).then(() => {
                window.location.href = '/auth/forgot-password';
            });
        }

        $('#newPassword').on('input', function() {
            checkPasswordStrength($(this).val());

            const confirmPass = $('#confirmPassword').val();
            if (confirmPass) {
                if ($(this).val() === confirmPass) {
                    $('#matchMessage').html('<i class="fas fa-check-circle me-1" style="color: #2ECC71;"></i>Passwords match').css('color', '#2ECC71');
                } else {
                    $('#matchMessage').html('<i class="fas fa-times-circle me-1" style="color: #E76F51;"></i>Passwords do not match').css('color', '#E76F51');
                }
            }
        });

        $('#confirmPassword').on('input', function() {
            const newPass = $('#newPassword').val();
            if ($(this).val() === newPass) {
                $('#matchMessage').html('<i class="fas fa-check-circle me-1" style="color: #2ECC71;"></i>Passwords match').css('color', '#2ECC71');
            } else {
                $('#matchMessage').html('<i class="fas fa-times-circle me-1" style="color: #E76F51;"></i>Passwords do not match').css('color', '#E76F51');
            }
        });

        $('#resetForm').on('submit', function(e) {
            e.preventDefault();

            const newPassword = $('#newPassword').val();
            const confirmPassword = $('#confirmPassword').val();

            if (newPassword !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Passwords do not match'
                });
                return;
            }

            if (!checkPasswordStrength(newPassword)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Weak Password',
                    text: 'Please meet all password requirements'
                });
                return;
            }

            $('#submitBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Resetting...');

            $.ajax({
                url: '/auth/password/reset',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    resetToken: token,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                }),
                success: function(response) {
                    if (response.success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Password Reset!',
                            text: 'Your password has been successfully reset. You can now log in.',
                            confirmButtonColor: '#161E54'
                        }).then(() => {
                            window.location.href = '/auth/login';
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Error',
                            text: response.message || 'Failed to reset password'
                        });
                    }
                },
                error: function(xhr) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: xhr.responseJSON?.message || 'Failed to reset password'
                    });
                },
                complete: function() {
                    $('#submitBtn').prop('disabled', false).html('<i class="fas fa-save me-2"></i>Reset Password');
                }
            });
        });
    });
</script>
</body>
</html>
