<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Assignments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery + Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/quries.css">
</head>
<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="gradient-title text-center flex-grow-1">Task Assignment Management</h2>
        <a href="/admin/dashboard" class="btn btn-secondary ms-3">⬅ Back Home</a>
    </div>

    <div class="card p-3">
        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Search assignments...">
            </div>
            <div class="col-md-8 text-end">
                <button class="btn btn-secondary" onclick="resetSearch()">Reset</button>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Add Assignment</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>Code</th>
                    <th>Task</th>
                    <th>Staff</th>
                    <th>Assigned At</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <ul class="pagination justify-content-center" id="pagination"></ul>
    </div>
</div>

<!-- MODALS -->
<!-- Assignment Modal -->
<div class="modal fade" id="assignmentModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 id="modalTitle">Add Assignment</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="assignmentForm">
                    <input type="hidden" id="taskAssignCode">

                    <div class="mb-3">
                        <label>Task</label>
                        <select id="taskSelect" class="form-control" required></select>
                    </div>

                    <div class="mb-3">
                        <label>Staff</label>
                        <select id="staffSelect" class="form-control" required></select>
                    </div>

                    <div class="mb-3">
                        <label>Status</label>
                        <select id="statusSelect" class="form-control">
                            <option value="ASSIGNED">Assigned</option>
                            <option value="INITIATED">Initiated</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="PENDING_REVIEW">Pending Review</option>
                            <option value="APPROVED">Approved</option>
                            <option value="REJECTED">Rejected</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p>Are you sure you want to delete this assignment?</p>
                <small id="deleteCode" class="text-muted"></small>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">🗑 Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const api = "/taskAssignments";
    let allData = [];

    // =====================
    // Toast
    // =====================
    function showToast(msg, type="success") {
        const toastEl = document.createElement("div");
        toastEl.className = `toast align-items-center text-bg-${type} border-0`;
        toastEl.innerHTML = `
            <div class="d-flex">
                <div class="toast-body">${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>`;
        document.querySelector(".toast-container").appendChild(toastEl);
        new bootstrap.Toast(toastEl, { delay: 3000 }).show();
    }

    // =====================
    // Select2 Initialization
    // =====================
    function initSelect2() {
        $('#taskSelect').select2({
            dropdownParent: $('#assignmentModal'),
            width: '100%',
            ajax: {
                url: '/tasks/search',
                dataType: 'json',
                delay: 250,
                data: params => ({ q: params.term || "" }),
                processResults: data => ({ results: data.map(t => ({ id: t.taskId, text: t.description })) })
            }
        });

        $('#staffSelect').select2({
            dropdownParent: $('#assignmentModal'),
            width: '100%',
            ajax: {
                url: '/users/fetchAllUsers',
                dataType: 'json',
                delay: 250,
                data: params => ({ q: params.term || "" }),
                processResults: data => ({
                    results: data.filter(u => u.role.toLowerCase() === "staff")
                        .map(u => ({
                            id: u.staffId,
                            text: `${u.firstName} ${u.otherName || ''} - ${u.branchName || 'N/A'} / ${u.departmentName || 'N/A'}`
                        }))
                })
            }
        });
    }

    // =====================
    // Open Add/Edit Modal
    // =====================
    function openCreateModal() {
        $("#modalTitle").text("Add Assignment");
        $("#taskAssignCode").val("");
        $('#taskSelect').val(null).trigger('change');
        $('#staffSelect').val(null).trigger('change');
        $("#statusSelect").val("ASSIGNED");
        new bootstrap.Modal(document.getElementById('assignmentModal')).show();
    }

    function openEditModal(code) {
        const a = allData.find(x => x.taskAssignCode === code);
        if (!a) return;

        $("#modalTitle").text("Edit Assignment");
        $("#taskAssignCode").val(code);

        $('#taskSelect').empty().append(new Option(a.taskDescription, a.taskId, true, true)).trigger('change');
        $('#staffSelect').empty().append(new Option(`${a.staffFirstName} ${a.staffOtherName || ''} - ${a.staffBranch || 'N/A'} / ${a.staffDepartment || 'N/A'}`, a.staffId, true, true)).trigger('change');

        $("#statusSelect").val(a.status);
        new bootstrap.Modal(document.getElementById('assignmentModal')).show();
    }

    // =====================
    // Fetch All Assignments
    // =====================
    async function fetchAll() {
        try {
            const res = await fetch(`${api}/all`);
            allData = await res.json();
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            allData.forEach(a => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${a.taskAssignCode}</td>
                    <td>${a.taskDescription}</td>
                    <td>${a.staffFirstName} ${a.staffOtherName || ''} - ${a.staffBranch || 'N/A'} / ${a.staffDepartment || 'N/A'}</td>
                    <td>${new Date(a.assignedAt).toLocaleString()}</td>
                    <td>${a.status}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="openEditModal('${a.taskAssignCode}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="confirmDelete('${a.taskAssignCode}')">Delete</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error(err);
            showToast("Failed to load assignments", "danger");
        }
    }

    // =====================
    // Delete Confirmation
    // =====================
    function confirmDelete(code) {
        document.getElementById("deleteCode").innerText = code;
        const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
        deleteModal.show();

        document.getElementById("confirmDeleteBtn").onclick = async function() {
            try {
                const res = await fetch(`${api}/delete?taskAssignCode=${code}`, { method: 'DELETE' });
                if (!res.ok) throw new Error("Delete failed");
                showToast("Assignment deleted");
                deleteModal.hide();
                fetchAll();
            } catch (err) {
                console.error(err);
                showToast("Error deleting assignment", "danger");
            }
        }
    }

    // =====================
    // Form Submission
    // =====================
    $(document).ready(function() {
        initSelect2();
        fetchAll();

        $("#assignmentForm").submit(async function(e) {
            e.preventDefault();

            const payload = {
                taskId: $("#taskSelect").val(),
                staffId: $("#staffSelect").val(),
                status: $("#statusSelect").val()
            };

            const isEdit = $("#taskAssignCode").val() !== "";
            const url = isEdit ? `${api}/update?taskAssignCode=${$("#taskAssignCode").val()}` : `${api}/create`;
            const method = isEdit ? "PATCH" : "POST";

            try {
                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error("Failed to save assignment");

                const data = await res.json();
                showToast("Assignment saved successfully");
                new bootstrap.Modal(document.getElementById('assignmentModal')).hide();
                fetchAll();
            } catch (err) {
                console.error(err);
                showToast("Error saving assignment", "danger");
            }
        });
    });
</script>
</body>
</html>
