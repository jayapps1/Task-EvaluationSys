<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        .action-buttons button {
            display: inline-block;
            width: 35px;
            margin: 2px;
            padding: 5px;
        }
        .action-buttons i {
            font-size: 1rem;
        }
        .filter-card {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-active {
            background-color: #2ECC71;
            color: white;
        }
        .status-inactive {
            background-color: #E76F51;
            color: white;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <!-- Title + Dashboard Home -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-center fw-bold gradient-title flex-grow-1 mb-0">
            👥 User Management
        </h2>
        <a href="/admin/dashboard" class="btn btn-secondary ms-3">⬅ Back Home</a>
    </div>

    <!-- Filter Section -->
    <div class="filter-card">
        <h5 class="mb-3"><i class="bi bi-funnel-fill"></i> Filter Users</h5>
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label fw-semibold">Branch</label>
                <select id="filterBranch" class="form-control select2">
                    <option value="">All Branches</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Department</label>
                <select id="filterDepartment" class="form-control select2">
                    <option value="">All Departments</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Role</label>
                <select id="filterRole" class="form-control select2">
                    <option value="">All Roles</option>
                    <option value="ADMIN">Admin</option>
                    <option value="SUPERVISOR">Supervisor</option>
                    <option value="STAFF">Staff</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Status</label>
                <select id="filterStatus" class="form-control select2">
                    <option value="">All Status</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Search by Staff Code or Name</label>
                <input type="text" id="searchStaffCode" class="form-control" placeholder="Enter Staff Code or Name...">
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <button id="resetFilters" class="btn btn-secondary w-100">
                    <i class="bi bi-arrow-repeat"></i> Reset Filters
                </button>
            </div>
        </div>
    </div>

    <!-- Users Table -->
    <div class="card">
        <div class="card-header bg-primary text-light d-flex justify-content-between align-items-center">
            <span><i class="bi bi-people-fill"></i> All Users</span>
            <span id="userCount" class="badge bg-light text-dark">0 Users</span>
        </div>
        <div class="card-body position-relative">
            <!-- Loader -->
            <div id="loader" class="text-center py-3" style="display:none;">
                <div class="spinner-border text-primary" role="status"></div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover" id="usersTable">
                    <thead>
                    <tr>
                        <th>Staff Code</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Department</th>
                        <th>Branch</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- Pagination Controls -->
            <nav aria-label="User pagination" class="mt-3">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>
        </div>
    </div>

</div>

<!-- View Modal -->
<div class="modal fade" id="userViewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-light">
                <h5 class="modal-title"><i class="bi bi-person-badge-fill"></i> User Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="userModalBody"></div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-light">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="editStaffCode">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" id="editFirstName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Other Name</label>
                            <input type="text" class="form-control" id="editOtherName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="editEmail" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" id="editPhone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Role</label>
                            <select class="form-select select2" id="editRole">
                                <option value="ADMIN">Admin</option>
                                <option value="SUPERVISOR">Supervisor</option>
                                <option value="STAFF">Staff</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Rank</label>
                            <input type="text" class="form-control" id="editRank">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Branch</label>
                            <select class="form-select select2" id="editBranch">
                                <option value="">Select Branch</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <select class="form-select select2" id="editDepartment">
                                <option value="">Select Department</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Status</label>
                            <select class="form-select select2" id="editStatus">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-light">
                <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill"></i> Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete user <strong id="deleteStaffCode"></strong>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const baseUrl = '/users';
    let allUsers = [];
    let filteredUsers = [];
    let branches = [];
    let departments = [];
    let currentPage = 1;
    const rowsPerPage = 10;

    // Initialize Select2 and load data
    $(document).ready(function() {
        $('.select2').select2({ width: '100%', placeholder: 'Select option' });
        loadBranches();
        loadDepartments();
        loadUsers();
    });

    // Load branches for filter
    async function loadBranches() {
        try {
            const res = await axios.get('/branches');
            branches = res.data;

            let options = '<option value="">All Branches</option>';
            branches.forEach(b => {
                options += `<option value="${b.branchId}">${b.branchName}</option>`;
            });
            $('#filterBranch').html(options);
            $('#editBranch').html('<option value="">Select Branch</option>' +
                branches.map(b => `<option value="${b.branchId}">${b.branchName}</option>`).join(''));

            $('.select2').trigger('change');
        } catch(err) {
            console.error('Failed to load branches', err);
        }
    }

    // Load departments for filter
    async function loadDepartments() {
        try {
            const res = await axios.get('/departments');
            departments = res.data;

            let options = '<option value="">All Departments</option>';
            departments.forEach(d => {
                options += `<option value="${d.departmentId}">${d.departmentName}</option>`;
            });
            $('#filterDepartment').html(options);

            $('.select2').trigger('change');
        } catch(err) {
            console.error('Failed to load departments', err);
        }
    }

    // Filter departments based on selected branch (for edit modal)
    $('#editBranch').on('change', function() {
        const branchId = $(this).val();
        let options = '<option value="">Select Department</option>';

        const filteredDepts = branchId ? departments.filter(d => d.branch?.branchId == branchId) : departments;

        filteredDepts.forEach(d => {
            options += `<option value="${d.departmentId}">${d.departmentName}</option>`;
        });
        $('#editDepartment').html(options).trigger('change');
    });

    // Apply filters
    function applyFilters() {
        const branchId = $('#filterBranch').val();
        const departmentId = $('#filterDepartment').val();
        const role = $('#filterRole').val();
        const status = $('#filterStatus').val();
        const searchTerm = $('#searchStaffCode').val().toLowerCase();

        filteredUsers = allUsers.filter(user => {
            let match = true;

            if (branchId && user.branchId != branchId) match = false;
            if (departmentId && user.departmentId != departmentId) match = false;
            if (role && user.role !== role) match = false;
            if (status && String(user.active) !== status) match = false;
            if (searchTerm) {
                const staffCodeMatch = user.staffCode?.toString().includes(searchTerm);
                const nameMatch = `${user.firstName} ${user.otherName || ''}`.toLowerCase().includes(searchTerm);
                if (!staffCodeMatch && !nameMatch) match = false;
            }

            return match;
        });

        $('#userCount').text(`${filteredUsers.length} Users`);
        currentPage = 1;
        displayUsersPage();
    }

    // Display users with pagination
    function displayUsersPage() {
        const tbody = $('#usersTable tbody').empty();
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageUsers = filteredUsers.slice(start, end);

        if(pageUsers.length === 0){
            tbody.append('<tr><td colspan="9" class="text-center">No users found</td></tr>');
        }

        pageUsers.forEach(user => {
            const statusBadge = user.active ?
                '<span class="status-badge status-active">Active</span>' :
                '<span class="status-badge status-inactive">Inactive</span>';

            const tr = `
            <tr>
                <td>${user.staffCode}</td>
                <td>${user.firstName} ${user.otherName || ''}</td>
                <td>${user.email || ''}</td>
                <td>${user.phoneNumber || ''}</td>
                <td><span class="badge bg-secondary">${user.role || ''}</span></td>
                <td>${statusBadge}</td>
                <td>${user.departmentName || '-'}</td>
                <td>${user.branchName || '-'}</td>
                <td class="text-center action-buttons">
                    <button class="btn btn-sm btn-info" title="View" onclick='viewUser(${JSON.stringify(user).replace(/'/g, "&apos;")})'>
                        <i class="bi bi-eye-fill"></i>
                    </button>
                    <button class="btn btn-sm btn-primary" title="Edit" onclick="editUser(${user.staffCode})">
                        <i class="bi bi-pencil-fill"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" title="Delete" onclick="showDeleteModal(${user.staffCode})">
                        <i class="bi bi-trash-fill"></i>
                    </button>
                </td>
            </tr>`;
            tbody.append(tr);
        });

        renderPagination();
    }

    // Render pagination
    function renderPagination() {
        const totalPages = Math.ceil(filteredUsers.length / rowsPerPage);
        const pagination = $('#pagination').empty();

        if(totalPages <= 1){
            $('#pagination').hide();
            return;
        }
        $('#pagination').show();

        // Previous button
        if(currentPage > 1) {
            pagination.append(`<li class="page-item"><a class="page-link" href="#" data-page="${currentPage-1}">«</a></li>`);
        }

        for(let i = 1; i <= totalPages; i++){
            const li = $(`<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`);
            pagination.append(li);
        }

        // Next button
        if(currentPage < totalPages) {
            pagination.append(`<li class="page-item"><a class="page-link" href="#" data-page="${currentPage+1}">»</a></li>`);
        }

        $('.page-link').on('click', function(e){
            e.preventDefault();
            const page = $(this).data('page');
            if(page) {
                currentPage = page;
                displayUsersPage();
            }
        });
    }

    // Load all users
    async function loadUsers() {
        $('#loader').show();
        try {
            const res = await axios.get(`${baseUrl}/fetchAllUsers`);
            allUsers = res.data;
            applyFilters();
        } catch (err) {
            console.error('Failed to load users', err);
            allUsers = [];
            filteredUsers = [];
            displayUsersPage();
        } finally {
            $('#loader').hide();
        }
    }

    // View user
    function viewUser(user) {
        const statusBadge = user.active ?
            '<span class="status-badge status-active">Active</span>' :
            '<span class="status-badge status-inactive">Inactive</span>';

        const modalBody = document.getElementById('userModalBody');
        modalBody.innerHTML = `
            <div class="row">
                <div class="col-md-6">
                    <p><strong><i class="bi bi-qr-code"></i> Staff Code:</strong></p>
                    <p><strong><i class="bi bi-person"></i> Name:</strong></p>
                    <p><strong><i class="bi bi-envelope"></i> Email:</strong></p>
                    <p><strong><i class="bi bi-telephone"></i> Phone:</strong></p>
                </div>
                <div class="col-md-6">
                    <p>${user.staffCode}</p>
                    <p>${user.firstName} ${user.otherName || ''}</p>
                    <p>${user.email || '-'}</p>
                    <p>${user.phoneNumber || '-'}</p>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-md-6">
                    <p><strong><i class="bi bi-tag"></i> Role:</strong></p>
                    <p><strong><i class="bi bi-star"></i> Rank:</strong></p>
                    <p><strong><i class="bi bi-building"></i> Department:</strong></p>
                    <p><strong><i class="bi bi-shop"></i> Branch:</strong></p>
                    <p><strong><i class="bi bi-toggle-on"></i> Status:</strong></p>
                </div>
                <div class="col-md-6">
                    <p><span class="badge bg-secondary">${user.role || '-'}</span></p>
                    <p>${user.rank || '-'}</p>
                    <p>${user.departmentName || '-'}</p>
                    <p>${user.branchName || '-'}</p>
                    <p>${statusBadge}</p>
                </div>
            </div>
        `;
        new bootstrap.Modal(document.getElementById('userViewModal')).show();
    }

    // Edit user modal
    async function editUser(staffCode) {
        try {
            const res = await axios.get(`${baseUrl}/fetchUser/${staffCode}`);
            const u = res.data;

            $('#editStaffCode').val(u.staffCode);
            $('#editFirstName').val(u.firstName || '');
            $('#editOtherName').val(u.otherName || '');
            $('#editEmail').val(u.email || '');
            $('#editPhone').val(u.phoneNumber || '');
            $('#editRank').val(u.rank || '');
            $('#editRole').val(u.role).trigger('change');
            $('#editStatus').val(String(u.active)).trigger('change');

            // Load branches and set value
            await loadBranches();
            $('#editBranch').val(u.branchId).trigger('change');

            // Wait for branch change to load departments, then set department
            setTimeout(() => {
                $('#editDepartment').val(u.departmentId).trigger('change');
            }, 200);

            new bootstrap.Modal(document.getElementById('editUserModal')).show();
        } catch(err) {
            console.error(err);
            showToast('Failed to load user for editing', 'error');
        }
    }

    // Submit edit form
    $('#editUserForm').on('submit', function(e){
        e.preventDefault();
        const staffCode = $('#editStaffCode').val();
        const data = {
            firstName: $('#editFirstName').val(),
            otherName: $('#editOtherName').val(),
            email: $('#editEmail').val(),
            phoneNumber: $('#editPhone').val(),
            role: $('#editRole').val(),
            rank: $('#editRank').val(),
            departmentId: $('#editDepartment').val() || null,
            branchId: $('#editBranch').val() || null,
            active: $('#editStatus').val() === 'true'
        };

        axios.put(`${baseUrl}/updateUser/${staffCode}`, data)
            .then(() => {
                showToast('User updated successfully', 'success');
                loadUsers();
                bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
            })
            .catch(err => {
                const msg = err.response?.data?.message || 'Update failed';
                showToast(msg, 'error');
            });
    });

    // Delete user modal
    function showDeleteModal(staffCode) {
        $('#deleteStaffCode').text(staffCode);
        window.deleteStaffCode = staffCode;
        new bootstrap.Modal(document.getElementById('deleteUserModal')).show();
    }

    $('#confirmDeleteBtn').on('click', function(){
        if(window.deleteStaffCode){
            axios.delete(`${baseUrl}/deleteUser/${window.deleteStaffCode}`)
                .then(() => {
                    showToast('User deleted successfully', 'success');
                    loadUsers();
                    bootstrap.Modal.getInstance(document.getElementById('deleteUserModal')).hide();
                    window.deleteStaffCode = null;
                })
                .catch(err => {
                    showToast('Delete failed: ' + (err.response?.data?.message || err.message), 'error');
                });
        }
    });

    // Filter event listeners
    $('#filterBranch, #filterDepartment, #filterRole, #filterStatus').on('change', applyFilters);
    $('#searchStaffCode').on('input', function() {
        clearTimeout(window.searchTimeout);
        window.searchTimeout = setTimeout(applyFilters, 300);
    });

    $('#resetFilters').on('click', function() {
        $('#filterBranch').val('').trigger('change');
        $('#filterDepartment').val('').trigger('change');
        $('#filterRole').val('').trigger('change');
        $('#filterStatus').val('').trigger('change');
        $('#searchStaffCode').val('');
        applyFilters();
    });

    // Toast helper
    function showToast(msg, type = 'success') {
        const toastEl = $('#liveToast');
        if(type === 'error') {
            toastEl.removeClass('bg-success').addClass('bg-danger');
        } else {
            toastEl.removeClass('bg-danger').addClass('bg-success');
        }
        $('#toastMsg').text(msg);
        new bootstrap.Toast(toastEl[0], { delay: 3000 }).show();
    }

    // Reset modals after close
    $('#editUserModal').on('hidden.bs.modal', function () {
        $('#editUserForm')[0].reset();
        $('.select2', this).val(null).trigger('change');
    });
    $('#deleteUserModal').on('hidden.bs.modal', function () {
        window.deleteStaffCode = null;
    });
</script>

</body>
</html>
