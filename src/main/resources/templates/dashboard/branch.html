<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Branch Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">
</head>
<body>

<div class="container py-5">

    <!-- Title + Home Button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-center fw-bold gradient-title flex-grow-1 mb-0">
            🚀 Branch Management
        </h2>
        <a href="/admin/dashboard" class="btn btn-secondary ms-3">⬅ Back Home</a>
    </div>

    <!-- Create Button -->
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#branchModal">
        ➕ Create Branch
    </button>

    <!-- Search Card -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-light">Search Branch by Code</div>
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="searchBranchCode" class="form-control" placeholder="Enter branch code">
                <button class="btn btn-warning" id="searchBranchBtn">Search</button>
            </div>
            <div id="searchResult" class="mt-3"></div>
        </div>
    </div>

    <!-- Branch Table -->
    <div class="card">
        <div class="card-header bg-primary text-light">All Branches</div>
        <div class="card-body">
            <table class="table table-striped" id="branchesTable">
                <thead>
                <tr>
                    <th>Branch Code</th>
                    <th>Branch Name</th>
                    <th>Location</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<!-- Branch Create / Update Modal -->
<div class="modal fade" id="branchModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-light">
                <h5 class="modal-title">Branch Form</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="branchForm">
                    <input type="hidden" id="branchCodeHidden">
                    <div class="mb-3">
                        <input type="text" id="branchName" class="form-control" placeholder="Branch Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="branchLocation" class="form-control" placeholder="Location" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Branch View Modal -->
<div class="modal fade" id="viewModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-light">
                <h5 class="modal-title">Branch Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewModalBody"></div>
        </div>
    </div>
</div>

<!-- Branch Delete Modal -->
<div class="modal fade" id="deleteModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-light">
                <h5 class="modal-title">Delete Branch</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="deleteModalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const baseUrl = '/branches';
    let branchModalInstance, viewModalInstance, deleteModalInstance;
    let branchToDelete = null;

    // Load branches
    function loadBranches() {
        axios.get(baseUrl).then(res => {
            const tbody = document.querySelector('#branchesTable tbody');
            tbody.innerHTML = '';
            res.data.forEach(branch => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${branch.branchCode}</td>
                    <td>${branch.branchName}</td>
                    <td>${branch.location}</td>
                    <td>
                        <button class="btn btn-sm btn-warning"
                            onclick="editBranch('${branch.branchCode}', '${branch.branchName}', '${branch.location}')">Edit</button>
                        <button class="btn btn-sm btn-secondary"
                            onclick="viewBranch('${branch.branchCode}', '${branch.branchName}', '${branch.location}')">View</button>
                        <button class="btn btn-sm btn-danger"
                            onclick="deleteBranch('${branch.branchCode}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    // Create / Update branch
    document.getElementById('branchForm').addEventListener('submit', function(e){
        e.preventDefault();
        const code = document.getElementById('branchCodeHidden').value;
        const name = document.getElementById('branchName').value.trim();
        const location = document.getElementById('branchLocation').value.trim();

        if(code){
            // Update
            axios.put(`${baseUrl}/update`, { branchName: name, location: location }, { params: { branchCode: code } })
                .then(()=> { showToast('Branch updated'); resetForm(); loadBranches(); })
                .catch(err => alert('Update failed: ' + (err.response?.data?.message || err)));
        } else {
            // Create
            axios.post(`${baseUrl}/create`, { branchName: name, location: location })
                .then(res => { showToast('Branch created: ' + res.data.branchCode); resetForm(); loadBranches(); })
                .catch(err => alert('Error creating branch'));
        }
    });

    // Edit branch
    function editBranch(code, name, location){
        document.getElementById('branchCodeHidden').value = code;
        document.getElementById('branchName').value = name;
        document.getElementById('branchLocation').value = location;
        branchModalInstance = new bootstrap.Modal(document.getElementById('branchModal'));
        branchModalInstance.show();
    }

    // View branch
    function viewBranch(code, name, location){
        document.getElementById('viewModalBody').innerHTML = `
            <p><strong>Code:</strong> ${code}</p>
            <p><strong>Name:</strong> ${name}</p>
            <p><strong>Location:</strong> ${location}</p>
        `;
        viewModalInstance = new bootstrap.Modal(document.getElementById('viewModal'));
        viewModalInstance.show();
    }

    // Delete branch
    function deleteBranch(code){
        branchToDelete = code;
        document.getElementById('deleteModalBody').innerText = `Are you sure you want to delete branch ${code}?`;
        deleteModalInstance = new bootstrap.Modal(document.getElementById('deleteModal'));
        deleteModalInstance.show();
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', function(){
        if(!branchToDelete) return;
        axios.delete(baseUrl + '/delete', { params:{ branchCode: branchToDelete } })
            .then(()=> { showToast('Branch deleted'); loadBranches(); deleteModalInstance.hide(); branchToDelete = null; })
            .catch(err => alert('Delete failed: '+err));
    });

    // Search branch
    document.getElementById('searchBranchBtn').addEventListener('click', function(){
        const code = document.getElementById('searchBranchCode').value.trim();
        if(!code) return;
        axios.get(baseUrl + '/by-code', { params:{ branchCode: code } })
            .then(res => document.getElementById('searchResult').innerHTML =
                `<strong>${res.data.branchCode}</strong> - ${res.data.branchName} (${res.data.location})`)
            .catch(()=> document.getElementById('searchResult').innerHTML = 'Branch not found');
    });

    // Toast helper
    function showToast(msg){
        document.getElementById('toastMsg').innerText = msg;
        new bootstrap.Toast(document.getElementById('liveToast')).show();
    }

    // Reset form
    function resetForm(){
        document.getElementById('branchForm').reset();
        document.getElementById('branchCodeHidden').value = '';
        if(branchModalInstance) branchModalInstance.hide();
    }

    // Init
    loadBranches();
</script>

</body>
</html>
