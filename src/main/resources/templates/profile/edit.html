<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Edit Profile - TES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">

    <style>
        :root {
            --deep-navy: #161E54;
            --light-blue: #BBE0EF;
            --white: #FFFFFF;
            --success-green: #2ECC71;
            --error-red: #E76F51;
        }

        body {
            background-color: var(--light-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container-custom {
            padding: 20px;
            margin-top: 70px;
        }

        .page-header {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .edit-card {
            background: var(--white);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .btn-save {
            background-color: var(--success-green);
            border: none;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
        }

        .btn-save:hover {
            background-color: #27ae60;
            color: white;
        }

        .btn-cancel {
            background-color: #6C757D;
            border: none;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
            color: white;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--deep-navy);
            box-shadow: 0 0 0 0.2rem rgba(22, 30, 84, 0.25);
        }

        .form-control:disabled {
            background-color: #f8f9fa;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: var(--success-green);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .input-group-text {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container-custom">
    <div class="container">

        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2><i class="fas fa-user-edit"></i> Edit Profile</h2>
                    <p class="text-muted mb-0">Update your personal information</p>
                </div>
                <a th:href="@{/profile}" class="btn" style="background-color: var(--deep-navy); color: white; border-radius: 20px; padding: 8px 20px;">
                    <i class="fas fa-arrow-left"></i> Back to Profile
                </a>
            </div>
        </div>

        <div class="edit-card">
            <form id="editProfileForm">
                <!-- Staff Code (Read Only) -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Staff Code</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-id-card"></i>
                        </span>
                        <input type="text" class="form-control border-start-0"
                               th:value="${user.staffCode}" disabled>
                    </div>
                    <small class="text-muted">Staff code cannot be changed</small>
                </div>

                <!-- First Name -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">First Name <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" class="form-control border-start-0"
                               id="firstName" th:value="${user.firstName}"
                               placeholder="Enter your first name" required>
                    </div>
                </div>

                <!-- Other Name -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Other Name (Optional)</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" class="form-control border-start-0"
                               id="otherName" th:value="${user.otherName}"
                               placeholder="Enter your other name">
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Email Address <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" class="form-control border-start-0"
                               id="email" th:value="${user.email}"
                               placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Phone Number -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Phone Number (Optional)</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-phone"></i>
                        </span>
                        <input type="tel" class="form-control border-start-0"
                               id="phoneNumber" th:value="${user.phoneNumber}"
                               placeholder="Enter your phone number">
                    </div>
                </div>

                <!-- Department (Read Only) -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Department</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-building"></i>
                        </span>
                        <input type="text" class="form-control border-start-0"
                               th:value="${user.department?.departmentName ?: 'Not assigned'}" disabled>
                    </div>
                    <small class="text-muted">Department can only be changed by an administrator</small>
                </div>

                <!-- Branch (Read Only) -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Branch</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-code-branch"></i>
                        </span>
                        <input type="text" class="form-control border-start-0"
                               th:value="${user.branch?.branchName ?: 'Not assigned'}" disabled>
                    </div>
                    <small class="text-muted">Branch can only be changed by an administrator</small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-save flex-grow-1" id="submitBtn">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                    <a th:href="@{/profile}" class="btn btn-cancel flex-grow-1">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>

                <div id="message" class="error-message"></div>
            </form>
        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        $('#editProfileForm').on('submit', function(e) {
            e.preventDefault();

            const firstName = $('#firstName').val().trim();
            const otherName = $('#otherName').val().trim();
            const email = $('#email').val().trim();
            const phoneNumber = $('#phoneNumber').val().trim();

            // Clear previous messages
            $('#message').removeClass('success-message error-message').html('');

            // Validation
            if (!firstName) {
                $('#message').addClass('error-message').text('First name is required');
                return;
            }

            if (!email) {
                $('#message').addClass('error-message').text('Email is required');
                return;
            }

            // Email format validation
            const emailRegex = /^[A-Za-z0-9+_.-]+@(.+)$/;
            if (!emailRegex.test(email)) {
                $('#message').addClass('error-message').text('Please enter a valid email address');
                return;
            }

            // Phone validation (optional but if provided, must be valid)
            if (phoneNumber) {
                const phoneRegex = /^[0-9+\-\s()]{10,15}$/;
                if (!phoneRegex.test(phoneNumber)) {
                    $('#message').addClass('error-message').text('Please enter a valid phone number');
                    return;
                }
            }

            // Show loading
            $('#submitBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Saving...');

            $.ajax({
                url: '/profile/update',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    firstName: firstName,
                    otherName: otherName,
                    email: email,
                    phoneNumber: phoneNumber
                }),
                success: function(response) {
                    if (response.success) {
                        $('#message').removeClass('error-message').addClass('success-message')
                            .html('<i class="fas fa-check-circle"></i> ' + response.message);

                        // Redirect to profile after 2 seconds
                        setTimeout(() => {
                            window.location.href = '/profile';
                        }, 2000);
                    } else {
                        $('#message').removeClass('success-message').addClass('error-message')
                            .text(response.message);
                        $('#submitBtn').prop('disabled', false).html('<i class="fas fa-save me-2"></i>Save Changes');
                    }
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.message || 'Failed to update profile';
                    $('#message').removeClass('success-message').addClass('error-message').text(error);
                    $('#submitBtn').prop('disabled', false).html('<i class="fas fa-save me-2"></i>Save Changes');
                }
            });
        });
    });
</script>
</body>
</html>
