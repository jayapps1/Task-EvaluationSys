<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password - TES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/quries.css}">

    <style>
        :root {
            --deep-navy: #161E54;
            --light-blue: #BBE0EF;
            --white: #FFFFFF;
            --success-green: #2ECC71;
            --error-red: #E76F51;
            --warning-yellow: #F1C40F;
        }

        body {
            background-color: var(--light-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container-custom {
            padding: 20px;
            margin-top: 70px;
        }

        .page-header {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-card {
            background: var(--white);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        .btn-back {
            background-color: var(--deep-navy);
            border: none;
            color: white;
            border-radius: 20px;
            padding: 8px 20px;
        }

        .btn-back:hover {
            background-color: #0f1442;
            color: white;
        }

        .btn-save {
            background-color: var(--success-green);
            border: none;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
        }

        .btn-save:hover {
            background-color: #27ae60;
            color: white;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--deep-navy);
            box-shadow: 0 0 0 0.2rem rgba(22, 30, 84, 0.25);
        }

        .input-group-text {
            background-color: #f8f9fa;
            cursor: pointer;
        }

        .password-strength {
            height: 6px;
            border-radius: 5px;
            margin-top: 8px;
            background-color: #e9ecef;
        }

        .strength-fill {
            height: 100%;
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }

        .strength-weak .strength-fill { width: 33%; background-color: var(--error-red); }
        .strength-medium .strength-fill { width: 66%; background-color: var(--warning-yellow); }
        .strength-strong .strength-fill { width: 100%; background-color: var(--success-green); }

        .requirement {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
            display: flex;
            align-items: center;
        }

        .requirement i {
            margin-right: 8px;
            font-size: 12px;
        }

        .requirement.valid {
            color: var(--success-green);
        }

        .error-message {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: var(--success-green);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container-custom">
    <div class="container-fluid">

        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2><i class="fas fa-key"></i> Change Password</h2>
                    <p class="text-muted mb-0">Update your account password</p>
                </div>
                <a th:href="@{/profile}" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i> Back to Profile
                </a>
            </div>
        </div>

        <div class="form-card">
            <form id="changePasswordForm">
                <!-- Current Password -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Current Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 border-end-0"
                               id="currentPassword" placeholder="Enter current password" required>
                        <span class="input-group-text border-start-0" data-target="currentPassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>

                <!-- New Password -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 border-end-0"
                               id="newPassword" placeholder="Enter new password" required>
                        <span class="input-group-text border-start-0" data-target="newPassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>

                    <!-- Password Strength Meter -->
                    <div class="password-strength" id="strengthBar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div id="strengthText" class="requirement"></div>

                    <!-- Password Requirements -->
                    <div class="mt-3">
                        <div class="requirement" id="lengthReq">
                            <i class="far fa-circle"></i> At least 8 characters
                        </div>
                        <div class="requirement" id="upperReq">
                            <i class="far fa-circle"></i> One uppercase letter (A-Z)
                        </div>
                        <div class="requirement" id="lowerReq">
                            <i class="far fa-circle"></i> One lowercase letter (a-z)
                        </div>
                        <div class="requirement" id="digitReq">
                            <i class="far fa-circle"></i> One number (0-9)
                        </div>
                        <div class="requirement" id="specialReq">
                            <i class="far fa-circle"></i> One special character (!@#$%^&*)
                        </div>
                    </div>
                </div>

                <!-- Confirm New Password -->
                <div class="mb-4">
                    <label class="fw-bold mb-2">Confirm New Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="fas fa-check-circle"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 border-end-0"
                               id="confirmPassword" placeholder="Confirm new password" required>
                        <span class="input-group-text border-start-0" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div id="matchMessage" class="requirement"></div>
                </div>

                <button type="submit" class="btn btn-save w-100" id="submitBtn">
                    <i class="fas fa-save me-2"></i>Change Password
                </button>

                <div id="message" class="error-message"></div>
            </form>
        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Toggle password visibility
    $(document).on('click', '.input-group-text[data-target]', function() {
        const target = $(this).data('target');
        const field = $('#' + target);
        const icon = $(this).find('i');

        if (field.attr('type') === 'password') {
            field.attr('type', 'text');
            icon.removeClass('fa-eye').addClass('fa-eye-slash');
        } else {
            field.attr('type', 'password');
            icon.removeClass('fa-eye-slash').addClass('fa-eye');
        }
    });

    function checkPasswordStrength(password) {
        let strength = 0;
        const requirements = {};

        if (password.length >= 8) { requirements.length = true; strength++; } else { requirements.length = false; }
        if (/[A-Z]/.test(password)) { requirements.upper = true; strength++; } else { requirements.upper = false; }
        if (/[a-z]/.test(password)) { requirements.lower = true; strength++; } else { requirements.lower = false; }
        if (/[0-9]/.test(password)) { requirements.digit = true; strength++; } else { requirements.digit = false; }
        if (/[^A-Za-z0-9]/.test(password)) { requirements.special = true; strength++; } else { requirements.special = false; }

        return { strength, requirements };
    }

    function updateStrengthUI(strength, requirements) {
        const bar = $('#strengthBar');
        const text = $('#strengthText');

        bar.removeClass('strength-weak strength-medium strength-strong');

        if (strength === 0) {
            text.html('<i class="fas fa-info-circle"></i> Enter a password');
            text.css('color', '#888');
        } else if (strength <= 2) {
            bar.addClass('strength-weak');
            text.html('<i class="fas fa-exclamation-triangle"></i> Weak password');
            text.css('color', '#E76F51');
        } else if (strength <= 4) {
            bar.addClass('strength-medium');
            text.html('<i class="fas fa-check"></i> Medium password');
            text.css('color', '#F1C40F');
        } else {
            bar.addClass('strength-strong');
            text.html('<i class="fas fa-shield-alt"></i> Strong password');
            text.css('color', '#2ECC71');
        }

        updateRequirementUI('#lengthReq', requirements.length);
        updateRequirementUI('#upperReq', requirements.upper);
        updateRequirementUI('#lowerReq', requirements.lower);
        updateRequirementUI('#digitReq', requirements.digit);
        updateRequirementUI('#specialReq', requirements.special);
    }

    function updateRequirementUI(selector, isValid) {
        const element = $(selector);
        const icon = element.find('i');
        if (isValid) {
            element.addClass('valid');
            icon.removeClass('fa-circle').addClass('fa-check-circle');
        } else {
            element.removeClass('valid');
            icon.removeClass('fa-check-circle').addClass('fa-circle');
        }
    }

    $(document).ready(function() {
        $('#newPassword').on('input', function() {
            const result = checkPasswordStrength($(this).val());
            updateStrengthUI(result.strength, result.requirements);

            const confirmPass = $('#confirmPassword').val();
            if (confirmPass) {
                checkPasswordMatch($(this).val(), confirmPass);
            }
        });

        $('#confirmPassword').on('input', function() {
            checkPasswordMatch($('#newPassword').val(), $(this).val());
        });

        function checkPasswordMatch(newPass, confirmPass) {
            const matchMsg = $('#matchMessage');
            if (!confirmPass) { matchMsg.html(''); return; }

            if (newPass === confirmPass) {
                matchMsg.html('<i class="fas fa-check-circle" style="color: #2ECC71;"></i> Passwords match');
            } else {
                matchMsg.html('<i class="fas fa-times-circle" style="color: #E76F51;"></i> Passwords do not match');
            }
        }

        $('#changePasswordForm').on('submit', function(e) {
            e.preventDefault();

            const currentPassword = $('#currentPassword').val();
            const newPassword = $('#newPassword').val();
            const confirmPassword = $('#confirmPassword').val();

            $('#message').removeClass('success-message error-message').html('');

            if (!currentPassword || !newPassword || !confirmPassword) {
                $('#message').addClass('error-message').text('Please fill in all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                $('#message').addClass('error-message').text('Passwords do not match');
                return;
            }

            const result = checkPasswordStrength(newPassword);
            if (result.strength < 3) {
                $('#message').addClass('error-message').text('Please create a stronger password');
                return;
            }

            $('#submitBtn').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Changing...');

            $.ajax({
                url: '/profile/change-password',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    currentPassword: currentPassword,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                }),
                success: function(response) {
                    if (response.success) {
                        $('#message').removeClass('error-message').addClass('success-message')
                            .html('<i class="fas fa-check-circle"></i> ' + response.message);
                        $('#changePasswordForm')[0].reset();
                        updateStrengthUI(0, {});

                        setTimeout(() => {
                            window.location.href = '/profile';
                        }, 2000);
                    } else {
                        $('#message').removeClass('success-message').addClass('error-message')
                            .text(response.message);
                        $('#submitBtn').prop('disabled', false).html('<i class="fas fa-save me-2"></i>Change Password');
                    }
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.message || 'Failed to change password';
                    $('#message').removeClass('success-message').addClass('error-message').text(error);
                    $('#submitBtn').prop('disabled', false).html('<i class="fas fa-save me-2"></i>Change Password');
                }
            });
        });
    });
</script>
</body>
</html>
